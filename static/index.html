<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K8s Sentinel | Bedrock Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0a0c; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .terminal-scroll::-webkit-scrollbar { width: 4px; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }
        .scan-line { background: linear-gradient(to bottom, transparent 50%, rgba(34, 211, 238, 0.1) 50%); background-size: 100% 4px; pointer-events: none; }
    </style>
</head>
<body class="text-gray-300 h-screen overflow-hidden flex flex-col">

    <header class="h-16 border-b border-gray-800 flex items-center justify-between px-8 bg-black/50">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-cyan-500 rounded-full animate-pulse shadow-[0_0_10px_#22d3ee]"></div>
            <h1 class="text-xl font-bold tracking-widest text-white">K8S<span class="text-cyan-400">SENTINEL</span></h1>
        </div>
        <div class="flex gap-6 text-xs font-mono">
            <div class="flex flex-col items-end"><span class="text-gray-500">BACKEND</span><span class="text-cyan-400">AWS BEDROCK (US-EAST-1)</span></div>
            <div class="flex flex-col items-end"><span class="text-gray-500">MODEL</span><span class="text-white">SONNET 4.6</span></div>
        </div>
    </header>

    <main class="flex-grow flex p-6 gap-6 overflow-hidden">
        
        <aside class="w-80 flex flex-col gap-4">
            <div class="glass rounded-xl p-5 flex-grow">
                <h3 class="text-sm font-bold text-gray-400 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-shield-halved text-cyan-500"></i> SECURITY INSIGHTS
                </h3>
                <div id="risk-feed" class="space-y-3">
                    <div class="text-[10px] uppercase text-gray-600 border-b border-gray-800 pb-2">Awaiting Analysis...</div>
                </div>
            </div>
            <div class="glass rounded-xl p-5 h-48">
                <h3 class="text-sm font-bold text-gray-400 mb-2">CLUSTER HEALTH</h3>
                <div class="flex justify-center items-center h-full">
                    <div class="w-24 h-24 border-4 border-dashed border-gray-800 rounded-full animate-spin-slow flex items-center justify-center">
                        <i class="fa-solid fa-network-wired text-gray-600 text-2xl"></i>
                    </div>
                </div>
            </div>
        </aside>

        <section class="flex-grow flex flex-col glass rounded-2xl relative overflow-hidden">
            <div class="scan-line absolute inset-0 z-0 opacity-20"></div>
            
            <div id="output" class="flex-grow p-8 font-mono text-sm overflow-y-auto terminal-scroll z-10 space-y-4">
                <div class="text-cyan-500/50">System initialized. Ready for command input...</div>
            </div>

            <div class="p-6 bg-black/40 border-t border-white/5 z-10">
                <div class="relative flex items-center">
                    <i class="fa-solid fa-chevron-right absolute left-4 text-cyan-500"></i>
                    <input type="text" id="userInput" placeholder="Run full security audit..." 
                           class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-32 focus:outline-none focus:border-cyan-500/50 transition-all placeholder:text-gray-600">
                    <button onclick="startAudit()" class="absolute right-2 bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-2 rounded-lg font-bold text-xs tracking-widest transition-all">
                        EXECUTE
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
